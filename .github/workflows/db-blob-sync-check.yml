name: DB + Blob sync check

# Order/regression gate: verifies the dev + prod Supabase Postgres databases and
# the Vercel Blob store are in the expected state. Read-only. DEV is a used
# dev/preview scratch DB, so accumulated EMPTY-group rows there are an Advisory
# (WARN), not a fail; PROD carries live user data, so there the EMPTY-group row
# counts are informational (the old "prod is also empty" assumption was stale and
# kept this gate red on a used production DB — the same now applies to the
# actively-used dev DB). Both still enforce connectivity, schema, no drift,
# PRESERVED tables and parity. Runs pydatabastest.py --ci, which never prompts and
# exits non-zero on any FAIL. If a DB/blob secret is empty, that target is SKIPPED
# with a WARN so the job still passes meaningfully in forks / environments without
# prod credentials.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: db-blob-sync-${{ github.ref }}
  cancel-in-progress: true

# Read-only check: needs no write scopes and no persisted git credentials.
permissions:
  contents: read

jobs:
  db-blob-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Don't leave the GITHUB_TOKEN in git config while PR-controlled code runs.
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.dbtest.txt

      # Behavior tests for the gate's EMPTY-group decision logic (enforce/warn/info).
      # No DB or credentials needed, so they run on every event including PRs.
      - name: Run gate unit tests
        run: python -m unittest test_pydatabastest -v

      # SECURITY: production credentials are injected ONLY on trusted events (push to
      # master / manual dispatch). On pull_request a separate no-secret step runs the
      # same script, so PR-controlled code can never execute with production secrets.
      - name: Run DB + Blob sync gate (trusted events, with credentials)
        if: github.event_name != 'pull_request'
        run: python pydatabastest.py --ci
        env:
          # The script tries the pooled (pooler.supabase.com) URL first, then direct.
          POSTGRES_URL_DEV: ${{ secrets.POSTGRES_URL_DEV }}
          POSTGRES_URL_PROD: ${{ secrets.POSTGRES_URL_PROD }}
          # Vercel Blob store token (store id must be sajtmaskin-blob / NHrq4GU42kcujMOV).
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          # Supabase presents a self-signed cert chain; keep TLS verification relaxed.
          DB_SSL_REJECT_UNAUTHORIZED: "false"

      - name: Validate gate script (pull_request, no credentials)
        if: github.event_name == 'pull_request'
        # No secrets are injected here, so the PR's (untrusted) script can never run
        # with production credentials. Each DB/blob target SKIPs with a WARN; this step
        # only validates that the script parses and runs.
        run: python pydatabastest.py --ci
        env:
          DB_SSL_REJECT_UNAUTHORIZED: "false"
