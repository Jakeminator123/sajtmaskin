# Sajtmaskin AI defaults (staging for .env.local)
# -----------------------------------------------
# Canonical runtime keys are still process.env — see src/lib/gen/defaults.ts,
# src/lib/builder/defaults.ts, and src/app/api/ai/* routes.
#
# Emit KEY=value lines:  npm run config:env-print
#                        python config/scripts/emit_env_from_ini.py
#
# Optional: copy to ai.local.ini (add ai.local.ini to .gitignore if it contains
# anything you do not want committed) and pass --ini.

# --- Builder code generation (OpenAI IDs, direct API) ------------------------
[builder_openai_models]
SAJTMASKIN_MODEL_FAST = gpt-4.1
SAJTMASKIN_MODEL_PRO = gpt-5.3-codex
SAJTMASKIN_MODEL_MAX = gpt-5.4
SAJTMASKIN_MODEL_CODEX = gpt-5.1-codex-max

# --- Prompt assist + polish (AI Gateway style openai/... where required) -----
[prompt_assist_gateway_models]
SAJTMASKIN_ASSIST_MODEL = openai/gpt-5.4
SAJTMASKIN_POLISH_MODEL = openai/gpt-5.3-codex

# --- Token budgets (four prompt-assist surfaces + engine) --------------------
# Routes: brief, chat, spec, polish share gateway assist; caps below map to
# env vars actually read in routes + defaults.ts.
[tokens_engine_and_autofix]
SAJTMASKIN_ENGINE_MAX_OUTPUT_TOKENS = 128000
SAJTMASKIN_AUTOFIX_MAX_OUTPUT_TOKENS = 32768
SAJTMASKIN_AUTOFIX_SYNTAX_MAX_PASSES = 6

[tokens_prompt_assist]
SAJTMASKIN_ASSIST_MAX_OUTPUT_TOKENS = 81920
AI_BRIEF_MAX_TOKENS = 131072
AI_CHAT_MAX_TOKENS = 131072

# Spec route uses SAJTMASKIN_ASSIST_MAX_OUTPUT_TOKENS unless extended in code.

[tokens_timeouts]
SAJTMASKIN_ENGINE_ROUTE_MAX_DURATION_SECONDS = 800
SAJTMASKIN_ASSIST_ROUTE_MAX_DURATION_SECONDS = 600
