# Fly app names need lowercase letters and hyphens.
app = "vm-fly-jakem"
primary_region = "arn"

[build]
  dockerfile = "Dockerfile"

[env]
  HOST = "0.0.0.0"
  PORT = "8080"
  PREVIEW_BASE_URL = "https://vm-fly-jakem.fly.dev"
  PREVIEW_SESSION_TTL_MS = "1800000"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
