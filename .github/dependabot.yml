version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    # Dependabot appends the scope itself ("(deps)"/"(deps-dev)") when
    # include: "scope" is set, so the prefix must NOT already contain "(deps)"
    # or PR titles double up as "chore(deps)(deps): ...".
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    groups:
      npm-production-patch:
        dependency-type: "production"
        update-types:
          - "patch"
        patterns:
          - "*"
      npm-development-patch:
        dependency-type: "development"
        update-types:
          - "patch"
        patterns:
          - "*"
      npm-low-risk-minor:
        update-types:
          - "minor"
        patterns:
          - "@radix-ui/*"
          - "lucide-react"
          - "nanoid"
          - "swr"
          - "tailwind-merge"
          - "date-fns"
          - "zustand"
          - "prettier"
          - "dotenv"
          - "ajv"
        exclude-patterns:
          - "ai"
          - "@ai-sdk/*"
          - "next"
          - "react"
          - "react-dom"
          - "typescript"
          - "tailwindcss"
          - "@tailwindcss/*"
          - "eslint"
          - "@eslint/*"
          - "@types/node"
          - "stripe"
          - "openai"
          - "recharts"
    # Majors are handled manually per domain (see docs/dependency-policy.md).
    # Security updates are exempt from version-update ignores and still surface.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    # Actions policy is patch/minor only; majors are handled manually (same as
    # npm above). Security updates are exempt from version-update ignores and
    # still surface. Prevents cases like fetch-metadata 2->3 (major) slipping in.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
