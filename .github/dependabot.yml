version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    # Dependabot appends the scope itself ("(deps)"/"(deps-dev)") when
    # include: "scope" is set, so the prefix must NOT already contain "(deps)"
    # or PR titles double up as "chore(deps)(deps): ...".
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    groups:
      npm-production-patch:
        dependency-type: "production"
        update-types:
          - "patch"
        patterns:
          - "*"
        # Two reasons a package is excluded from the grouped patch bundle:
        #
        # 1. CORE packages always come as ISOLATED manual PRs
        #    (docs/dependency-policy.md). Without this the grouped patch PR swept
        #    them in — #408 bundled next/react/react-dom/ai patches together with
        #    19 other bumps, defeating the "one reviewed core package per PR"
        #    intent even though the auto-merge workflow blocks core names.
        # 2. BASELINE-PINNED packages are exact-locked (major.minor.patch) in the
        #    scaffold baseline (KNOWN_PACKAGES / project-scaffold.ts); even a patch
        #    breaks project-scaffold-baseline-parity.test.ts unless the pin is
        #    synced in the same commit (see "Baseline-pinnade paket"). E.g. #399
        #    @react-three/fiber 9.6.0->9.6.1.
        exclude-patterns:
          - "ai"
          - "@ai-sdk/*"
          - "next"
          - "react"
          - "react-dom"
          - "typescript"
          - "tailwindcss"
          - "@tailwindcss/*"
          - "eslint"
          - "@eslint/*"
          - "@types/node"
          - "stripe"
          - "openai"
          - "recharts"
          - "three"
          - "@react-three/*"
          - "lucide-react"
      npm-development-patch:
        dependency-type: "development"
        update-types:
          - "patch"
        patterns:
          - "*"
        # Dev-side core packages (typescript/eslint/@types/node) must not be
        # grouped either — a TS or ESLint patch can shift lint/type output and
        # deserves its own reviewed PR (docs/dependency-policy.md).
        exclude-patterns:
          - "typescript"
          - "eslint"
          - "@eslint/*"
          - "@types/node"
      npm-low-risk-minor:
        update-types:
          - "minor"
        patterns:
          - "@radix-ui/*"
          - "nanoid"
          - "swr"
          - "tailwind-merge"
          - "date-fns"
          - "zustand"
          - "prettier"
          - "dotenv"
          - "ajv"
        exclude-patterns:
          - "ai"
          - "@ai-sdk/*"
          - "next"
          - "react"
          - "react-dom"
          - "typescript"
          - "tailwindcss"
          - "@tailwindcss/*"
          - "eslint"
          - "@eslint/*"
          - "@types/node"
          - "stripe"
          - "openai"
          - "recharts"
          # Baseline-pinned (exact major.minor.patch): its minors must be pin-synced
          # manually, never grouped as "low-risk" (see "Baseline-pinnade paket").
          - "lucide-react"
    # Majors are handled manually per domain (see docs/dependency-policy.md).
    # Security updates are exempt from version-update ignores and still surface.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    # Actions policy is patch/minor only; majors are handled manually (same as
    # npm above). Security updates are exempt from version-update ignores and
    # still surface. Prevents cases like fetch-metadata 2->3 (major) slipping in.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
