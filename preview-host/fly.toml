# Fly app names need lowercase letters and hyphens.
app = "vm-fly-jakem"
primary_region = "arn"

[build]
  dockerfile = "Dockerfile"

[[vm]]
  memory = "8gb"
  cpus = 4

[env]
  HOST = "0.0.0.0"
  PORT = "8080"
  PREVIEW_BASE_URL = "https://vm-fly-jakem.fly.dev"
  PREVIEW_SESSION_TTL_MS = "7200000"
  PREVIEW_HOST_DATA_DIR = "/data"
  PREVIEW_HOST_RUNTIME_READY_MAX_MS = "600000"

[[mounts]]
  source = "preview_host_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    # Höjt från 10s → 20s så health-checken inte falsk-larmar när VM:en
    # är upptagen med npm install / boot för en ny preview. Tre missade i
    # rad markerar fortfarande VM som unhealthy, men marginalen räcker nu.
    timeout = "20s"
    grace_period = "30s"
    method = "GET"
    path = "/health"
