# Fly app names need lowercase letters and hyphens.
app = "vm-fly-jakem"
primary_region = "arn"

[build]
  dockerfile = "Dockerfile"

[env]
  HOST = "0.0.0.0"
  PORT = "8080"
  PREVIEW_BASE_URL = "https://vm-fly-jakem.fly.dev"
  PREVIEW_SESSION_TTL_MS = "3600000"
  PREVIEW_HOST_DATA_DIR = "/data"
  PREVIEW_HOST_RUNTIME_READY_MAX_MS = "300000"

[[mounts]]
  source = "preview_host_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "30s"
    method = "GET"
    path = "/health"
