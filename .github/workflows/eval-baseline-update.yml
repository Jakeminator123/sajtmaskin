name: Eval Baseline Update

# Runs the eval suite and refreshes `src/lib/gen/eval/eval-baseline.json` when
# the suite passes its own gate. Two trigger modes:
#
#   - workflow_dispatch  → operator triggers manually after a deliberate
#     pipeline improvement, picks dry-run vs. real save in the input.
#   - schedule (weekly)  → keeps the baseline drifting with reality so the
#     `--gate` check in CI doesn't silently rot. Skipped if no improvements
#     vs. current baseline (commit step is no-op).
#
# Cost note: each run consumes OPENAI quota for the full eval prompt set
# (~15 prompts at the time of writing). Schedule is intentionally weekly,
# not daily.
#
# Required secrets:
#   - OPENAI_API_KEY  → consumed by the eval LLM calls.
#
# Behavior:
#   1. Run a SINGLE `cli.ts` invocation with `--gate` (and `--save-baseline`
#      unless dry_run is true). cli.ts always runs the eval first, then
#      compares against baseline; with --gate it exits 1 on regression
#      BEFORE writing the new baseline (cli.ts:90-93). One invocation =
#      one OpenAI billing run, not three.
#   2. If the run succeeded and `eval-baseline.json` actually changed,
#      open a PR (draft) so the operator can review the deltas before
#      merging. Direct push to master is intentionally avoided because
#      baseline shifts can hide real regressions if accepted blindly.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip baseline write + PR (only run eval + gate compare)"
        required: false
        default: false
        type: boolean
  schedule:
    # Every Monday at 04:11 UTC. Offset from `weekly-template-sync` (03:23) so
    # they don't pile up if both queue.
    - cron: "11 4 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: eval-baseline-update
  cancel-in-progress: false

jobs:
  refresh-baseline:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify OPENAI_API_KEY is present
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY secret is not configured. Add it under Repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Single combined invocation: cli.ts always runs the eval + comparison;
      # `--gate` exits 1 on regression BEFORE the baseline write happens, and
      # `--save-baseline` writes only if we got past --gate. One run = one
      # OpenAI billing event (instead of three back-to-back runs).
      - name: Run eval + gate (and save baseline unless dry-run)
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            npx tsx src/lib/gen/eval/cli.ts --gate
          else
            npx tsx src/lib/gen/eval/cli.ts --gate --save-baseline
          fi

      - name: Detect baseline change
        id: diff
        if: ${{ github.event.inputs.dry_run != 'true' }}
        shell: bash
        run: |
          if git diff --quiet -- src/lib/gen/eval/eval-baseline.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No baseline change to commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with refreshed baseline
        if: ${{ steps.diff.outputs.changed == 'true' }}
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(eval): refresh eval-baseline.json (auto-update)"
          branch: chore/eval-baseline-${{ github.run_id }}
          delete-branch: true
          title: "chore(eval): refresh eval-baseline.json"
          body: |
            Automated refresh of `src/lib/gen/eval/eval-baseline.json` after
            this week's eval run passed the gate.

            **Review checklist** before merging:
            - Does the new average score look right (no suspicious jumps)?
            - Any prompts that flipped PASS -> FAIL or FAIL -> PASS?
            - New blocking checks added vs. previous baseline?

            Trigger: ${{ github.event_name }}
            Run: ${{ github.run_id }}
          labels: |
            eval
            automated
          draft: true
