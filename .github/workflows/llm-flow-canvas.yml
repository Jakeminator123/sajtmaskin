name: LLM-flow Canvas Refresh

# Regenererar docs/canvases/llm-flow.canvas.txt fran repo-signaler (domain-map,
# BUG-SWARM-BACKLOG.md, evals/results/baseline-master, git-churn) och oppnar en
# draft-PR nar den faktiskt andrats.
#
# Skonsam mot ett repo i tung forandring:
#   - Ror ALDRIG kallkod. Bara canvas-.txt regenereras.
#   - .txt (inte .tsx) sa repots tsc/eslint aldrig ror artefakten.
#   - Loop-saker: `paths-ignore` pa canvas-pathen + deterministisk generator
#     (ingen diff -> ingen PR).
#   - Beroendefri generator (ren Node). Inget `npm ci` behovs.

on:
  push:
    branches: [master]
    paths-ignore:
      - "docs/canvases/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: llm-flow-canvas
  cancel-in-progress: false

jobs:
  refresh-canvas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Hela historiken sa git-churn (--since) kan raknas.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Generate canvas artifact
        run: node scripts/canvas/build-llm-flow-canvas.mjs

      - name: Detect canvas change
        id: diff
        shell: bash
        run: |
          if git diff --quiet -- docs/canvases/llm-flow.canvas.txt; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Ingen canvas-andring att committa."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with refreshed canvas
        if: ${{ steps.diff.outputs.changed == 'true' }}
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(canvas): refresh llm-flow canvas (auto-update)"
          # Stabilt branch-namn (INTE run_id) sa create-pull-request uppdaterar
          # EN rullande PR i stallet for att oppna en ny per push. Eftersom
          # canvas-artefakten bar HEAD-commit-stampeln andras den vid varje push,
          # sa ett run_id-suffix har skulle ge en ny draft-PR for varje push (PR-spam).
          branch: chore/llm-flow-canvas
          delete-branch: true
          title: "chore(canvas): refresh llm-flow canvas"
          body: |
            Auto-genererad uppdatering av `docs/canvases/llm-flow.canvas.txt`
            efter en push till `master`.

            Rör enbart canvas-artefakten (ingen källkod). Rendera lokalt med:

            ```
            node scripts/canvas/sync-to-cursor.mjs
            ```

            Trigger: ${{ github.event_name }} · Run: ${{ github.run_id }}
          labels: |
            canvas
            automated
          draft: true
