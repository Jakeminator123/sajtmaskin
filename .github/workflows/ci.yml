name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      # Grandmaster 5-7: the follow-up CONTRACT invariants (5-3/5-3b scaffold+route
      # freeze/clamp, 5-5 capability floor) are deterministic hard contracts — promote
      # them from the warn-only stability lane to a BLOCKING step so a regression reddens
      # CI instead of only warning. They still also run in the warn-only `stability` job
      # below (full set); this step hard-gates only the follow-up contract subset.
      - name: Follow-up contract invariants (blocking, grandmaster 5-7)
        # B14 (mirrors the C2 step below): run even if an earlier step (test:ci)
        # failed, so a follow-up-contract regression is never masked/skipped by a
        # red test:ci. Step gating defaults to success(); !cancelled() overrides.
        if: ${{ !cancelled() }}
        run: npm run test:followup-contract

      - name: Verify baseline dependency versions
        run: npm run baseline-deps:verify

      - name: Verify baseline dependency tree
        run: npm run baseline-deps:tree

      - name: Validate scaffold manifests
        run: npm run scaffolds:validate

      - name: Validate dossier manifests
        run: npm run dossiers:validate-all

      # NOTE: the dossier capability-map (data/dossiers/_index/capability-map.json)
      # is a GENERATED tooling view, never read at runtime (the registry walks
      # data/dossiers/{hard,soft}/ directly). Its former drift-check
      # (`dossiers:capability-map:check`) was pure maintenance tax and was
      # removed. Regenerate on demand with `npm run dossiers:capability-map:write`
      # (or the backoffice "Bygg om" tab) when curating.

      - name: Validate control-plane registries
        run: npm run control-plane:check

      - name: Verify generated contract docs
        run: npm run docs:check

      - name: Verify active documentation links
        run: npm run docs:links

      - name: Verify terminology ownership
        run: npm run check:terms:contract

      # Plan B #9: route `maxDuration` literals are generated from
      # config/ai_models/manifest.json routeTimeouts (canonical owner:
      # scripts/ai-models/sync-route-timeouts.mjs). Blocking gate so a drifted
      # literal reddens CI instead of shipping a stale per-route stream ceiling.
      - name: Verify route maxDuration ↔ manifest sync
        run: npm run route-timeouts:check

      # CI/Vercel-paritet (2026-07-03): Vercels prebuild kör `preflight:common`
      # (inkl. check-bug-backlog) — men detta jobb gjorde det inte, så en commit
      # kunde bli CI-grön och ändå fälla prod-deployen (hänt: #368, stängd
      # [x]-rad kvar i Aktiv kö → check-bug-backlog fällde bygget efter merge).
      # Kör samma sanity-checks här så draft-PR:er fångar det före merge.
      # route-timeouts:check dubblas medvetet (billig, redan grön ovan).
      - name: Preflight parity with Vercel prebuild (blocking)
        if: ${{ !cancelled() }}
        run: npm run preflight:common

  # Backoffice Python tests: control-plane/domain-map parity, matching-config
  # strict-schema validate-on-save, manifest parity and page-import smoke.
  # Deterministic + keyless (no DB creds, no network — all 49 tests run offline).
  # Blocking by design: domain-rules and prompt-heuristic-tokens declare
  # `backoffice:test` as their control-plane validator, so this job IS their
  # structural guarantee. Mirrors the Python setup in db-blob-sync-check.yml.
  backoffice-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install backoffice dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.backoffice.txt

      - name: Backoffice tests (blocking)
        run: npm run backoffice:test

  # Blockerande schema-drift-gate (grandmaster S4). Deterministisk, nyckelfri och billig:
  # låser att avsett schema (src/lib/db/schema.ts) == applicerat (db-init.mjs /
  # add-performance-indexes.mjs / migrations/*.sql). Kräver inga DB-creds. Medvetet UTAN
  # continue-on-error → ett rött resultat blockerar push/PR/merge. Den bredare vitest-
  # stabilitets-lanen nedan förblir warn-only (kan vara flaky).
  schema-drift:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Schema-drift gate (blocking)
        run: npm run db:schema-drift

  # Warn-only stabilitets-lane (grandmaster S1). Avsiktligt icke-blockerande:
  # continue-on-error gör att ett rött stabilitets-resultat aldrig blockerar
  # merge medan lanen stabiliseras. S4:s db:schema-drift-gate körs blockerande i det
  # separata schema-drift-jobbet ovan; här ligger den bredare (flaky) vitest-lanen
  # warn-only. Detta är platsen där C2 (ordlista-check) lägger sitt CI-steg.
  stability:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Stability lane (warn-only)
        run: npm run test:stability

      # Grandmaster C2: light ordlista-check. Warn-first by design - the script always
      # exits 0 and this whole job is continue-on-error, so it never blocks push/PR/merge.
      # if: !cancelled() so it still runs even if an earlier step (the flaky stability
      # lane) failed - step-level gating defaults to success(), which job-level
      # continue-on-error does NOT override. Skips only on an actual run cancellation.
      - name: Ordlista-check (warn-only, grandmaster C2)
        if: ${{ !cancelled() }}
        run: npm run check:terms

  # Preview-host runtime-guards (A#13/A#28). `preview-host/` är ett fristående
  # Node-paket (egen `package.json`, ingen lockfile → `npm install`, inte
  # `npm ci`). Guard-testerna är deterministiska, nyckelfria och plattforms-
  # oberoende (kör mot tmpdir, ingen Fly/nät): `check` (syntax), `test:guards`
  # (timeout-settle, idle-sweep, boot-serialisering) och `test:patch`. Kördes
  # tidigare bara lokalt, så en regression i preview-host-runtimen syntes först
  # på Fly. Blockerande gate (att göra checken required på master-rulesetet är
  # ett separat repo-inställningsval).
  preview-host-guards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Install preview-host dependencies
        working-directory: preview-host
        run: npm install --no-audit --no-fund

      - name: Preview-host runtime guards (blocking)
        working-directory: preview-host
        run: npm run check && npm run test:guards && npm run test:patch

  # Auto-applicerar migrationer mot PRODUKTIONS-databasen vid merge till master —
  # så en migration ALDRIG kan bli deployad utan att köras (grundorsaken till att
  # add-branded-site-domains.sql saknades i prod: migrationer körs INTE automatiskt
  # vid Vercel-deploy). Idempotent (`IF NOT EXISTS`) + bokför schema_migrations-
  # ledgern, så varje re-run är en no-op.
  #
  # SÄKERHET: prod-secret injiceras ALDRIG på pull_request (samma mönster som
  # prod-migrations-applied / db-blob-sync-check) — bara trusted events (push
  # master / manuell dispatch), så PR-kontrollerad kod aldrig ser prod-creds.
  # Guard-steget SKIP:ar apply tyst om secret:en saknas (fork utan creds) så
  # jobbet inte blir falskt rött där.
  #
  # Gate:as bakom quality + schema-drift så prod-schemat ALDRIG muteras för en
  # trasig merge. Additiv migration parallellt med Vercels deploy är ofarligt;
  # vill man ha helt race-fritt gate:ar man deployen bakom detta jobb separat.
  prod-migrations-apply:
    if: github.event_name != 'pull_request'
    needs: [quality, schema-drift]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fork-/no-secret-säkerhet: en fork (annat repo) saknar secret:en och SKIP:ar
      # apply i stället för att falla rött. MEN på HUVUDREPOT ska en saknad secret
      # falla HÅRT RÖTT — annars återuppstår exakt den false-green som orsakade den
      # ursprungliga saknade migrationen (apply skippas tyst + check exit 0 = grönt
      # utan att prod migrerats). Buggsvärm 2026-07-11: 3 oberoende träffar.
      - name: Detect prod credentials
        id: creds
        env:
          POSTGRES_URL_PROD: ${{ secrets.POSTGRES_URL_PROD }}
        run: |
          if [ -n "$POSTGRES_URL_PROD" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.repository }}" = "Jakeminator123/sajtmaskin" ]; then
            echo "::error::POSTGRES_URL_PROD saknas på huvudrepot — prod-migrationer kan inte auto-appliceras (false-green-risk). Sätt den: gh secret set POSTGRES_URL_PROD"
            exit 1
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::POSTGRES_URL_PROD saknas — hoppar över auto-apply (fork/no-secret)."
          fi

      - name: Apply pending migrations to production (idempotent)
        if: steps.creds.outputs.present == 'true'
        run: npx tsx scripts/db/run-migrations.ts
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL_PROD }}
          DB_ALLOW_PROD_LIKE_WRITE: "1"
          DB_SSL_REJECT_UNAUTHORIZED: "false"

      # Performance indexes are declared in add-performance-indexes.mjs (not in
      # the SQL-migration ledger), so before this they only reached prod via the
      # backoffice "Databashälsa"-button — a new hot-path index could silently
      # never land in prod. Apply them here too: the script is idempotent
      # (CREATE INDEX IF NOT EXISTS + dedupe-aware), so every run is a no-op once
      # the indexes exist. Same prod-write guard (DB_ALLOW_PROD_LIKE_WRITE) as the
      # migration step above.
      - name: Apply performance indexes to production (idempotent)
        if: steps.creds.outputs.present == 'true'
        run: npm run db:perf-indexes -- --reason "auto:ci-master-push"
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL_PROD }}
          DB_ALLOW_PROD_LIKE_WRITE: "1"
          DB_SSL_REJECT_UNAUTHORIZED: "false"

  # Verifierar EFTER auto-apply att PRODUKTIONS-databasen har ALLA migrations
  # applicerade (schema_migrations-ledgern == MIGRATION_ORDER). Read-only mot prod
  # (bara SELECT). `needs: prod-migrations-apply` gör detta till en post-condition
  # på apply-jobbet: rött = apply lyckades inte få prod i synk (ska aldrig hända
  # när apply gått grönt) → kör `npm run db:migrate:prod` manuellt.
  #
  # SÄKERHET: prod-secret injiceras ALDRIG på pull_request (samma mönster som
  # db-blob-sync-check) — jobbet körs bara på trusted events (push master /
  # manuell dispatch), så PR-kontrollerad kod aldrig ser prod-creds. Saknas
  # secret (fork) SKIP:ar checken med exit 0.
  prod-migrations-applied:
    if: github.event_name != 'pull_request'
    needs: prod-migrations-apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prod migration-ledger gate (blocking)
        run: node scripts/db/check-migrations-applied.mjs
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL_PROD }}
          DB_SSL_REJECT_UNAUTHORIZED: "false"
