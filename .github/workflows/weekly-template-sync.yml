name: Weekly Template Sync

on:
  schedule:
    # Every Monday at 03:23 UTC
    - cron: "23 3 * * 1"
  workflow_dispatch:
    inputs:
      include_embeddings:
        description: "Generate template embeddings"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: weekly-template-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync and validate templates
        run: npm run templates:refresh

      - name: Generate template embeddings
        if: ${{ env.OPENAI_API_KEY != '' && (github.event_name != 'workflow_dispatch' || github.event.inputs.include_embeddings == 'true') }}
        run: npm run templates:embeddings

      - name: Commit and push changes
        shell: bash
        run: |
          if git diff --quiet -- src/lib/templates/templates.json src/lib/templates/template-categories.json src/lib/templates/template-embeddings.json; then
            echo "No template updates to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add src/lib/templates/templates.json src/lib/templates/template-categories.json src/lib/templates/template-embeddings.json
          git commit -m "chore: weekly sync v0 templates and embeddings"
          git push
