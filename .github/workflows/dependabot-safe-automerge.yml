name: Dependabot safe auto-merge

# =============================================================================
# SAFETY NOTE — READ BEFORE ENABLING AUTO-MERGE
# =============================================================================
# The actual merge step (`gh pr merge --auto`) is ONLY safe when the `master`
# branch requires GREEN status checks before a merge is allowed. As of
# 2026-07-08 the "Protect master" ruleset requires a PR review AND required
# status checks (quality, backoffice-tests, schema-drift, added 2026-07-08),
# so the false-green window is closed. The merge step is still gated OFF by
# default — the actual on-switch is a separate deliberate choice.
#
# Therefore the merge step is GATED behind the repository variable
# DEPENDABOT_AUTOMERGE_ENABLED and is OFF by default. In the default (off)
# state this workflow ONLY labels eligible patch PRs (metadata only) — it never
# merges anything.
#
# To turn real auto-merge ON (all must hold, not just the variable):
#   1. [DONE 2026-07-08] Required status checks (quality, backoffice-tests,
#      schema-drift) are configured on the "Protect master" ruleset.
#   2. [TODO] Automate the bot-finding sweep/settling gate — `--auto` merges as
#      soon as review + required checks pass, but Codex/VADE findings can land
#      minutes after green CI (see pr-bot-findings-sweep.mdc).
#   3. [TODO] Add a changed-files/protected-path filter — the classifier below
#      only checks patch + core names, so a github-actions patch (e.g.
#      actions/checkout) editing .github/workflows/* would still pass.
#   4. Then set the repository variable DEPENDABOT_AUTOMERGE_ENABLED = true.
# See docs/dependency-policy.md for the full policy.
# =============================================================================

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Dependabot-triggered runs get a read-only token by default; these explicit
# permissions elevate the token for THIS workflow only.
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  dependabot-safe-automerge:
    runs-on: ubuntu-latest
    # Only act on Dependabot-authored PRs.
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Classify update (patch + non-core only)
        id: classify
        env:
          UPDATE_TYPE: ${{ steps.meta.outputs.update-type }}
          DEP_NAMES: ${{ steps.meta.outputs.dependency-names }}
        run: |
          eligible=true
          reason=""

          # Auto-merge is only ever considered for PATCH updates.
          if [ "$UPDATE_TYPE" != "version-update:semver-patch" ]; then
            eligible=false
            reason="not a patch update ($UPDATE_TYPE)"
          fi

          # Core packages ALWAYS require a manual PR (docs/dependency-policy.md).
          # Blocked names: ai, @ai-sdk/*, next, react, react-dom, typescript,
          # tailwindcss, @tailwindcss/*, eslint, @eslint/*, @types/node, stripe,
          # openai, recharts. Matching is fail-closed: anything uncertain stays
          # manual.
          #
          # Baseline-pinned packages are ALSO blocked: three, @react-three/*
          # and lucide-react are pinned at exact major.minor.patch in the scaffold
          # baseline (KNOWN_PACKAGES in src/lib/gen/autofix/dep-completer.ts /
          # project-scaffold.ts). Even a patch bump breaks
          # project-scaffold-baseline-parity.test.ts unless the pin is updated in
          # the same commit, so these can never auto-merge (e.g. #399 @react-three/
          # fiber 9.6.0->9.6.1). See docs/dependency-policy.md "Baseline-pinnade
          # paket".
          core_regex='^(ai|openai|stripe|recharts|typescript|next|react|react-dom|@types/node|three|lucide-react)$|^@ai-sdk/|^tailwindcss$|^@tailwindcss/|^eslint$|^@eslint/|^@react-three/'
          IFS=',' read -ra names <<< "$DEP_NAMES"
          for raw in "${names[@]}"; do
            name="$(echo "$raw" | xargs)"
            [ -z "$name" ] && continue
            if echo "$name" | grep -Eq "$core_regex"; then
              eligible=false
              reason="core package requires manual PR: $name"
            fi
          done

          echo "eligible=$eligible" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          echo "Eligibility: $eligible ${reason:+($reason)}"

      - name: Label eligible patch PR (metadata only — default behavior)
        if: ${{ steps.classify.outputs.eligible == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          REPO: ${{ github.repository }}
        run: |
          gh label create "dependabot-patch-safe" \
            --repo "$REPO" \
            --color "0e8a16" \
            --description "Dependabot patch update eligible for safe auto-merge" \
            || echo "label already exists"
          gh pr edit "$PR_URL" --add-label "dependabot-patch-safe"

      - name: Enable auto-merge (GATED — OFF unless required checks + variable are set)
        # Requires BOTH: an eligible patch PR AND the explicit opt-in variable.
        # Required status checks are enforced on "Protect master" (since
        # 2026-07-08), but --auto still runs NO bot-finding sweep and NO
        # protected-path filter (see SAFETY NOTE items 2-3). Keep
        # DEPENDABOT_AUTOMERGE_ENABLED unset until those gates exist.
        if: ${{ steps.classify.outputs.eligible == 'true' && vars.DEPENDABOT_AUTOMERGE_ENABLED == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
